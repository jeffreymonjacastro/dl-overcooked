model:
  feature_dim: 64
  hidden_dim: 128
training:
  prefer_cuda: true
  smoke_steps: 200
  batch_size: 4096
  lr: 0.0003
rollouts:
  num_workers: 16
  horizon: 250
  curriculum:
    - open_layouts_greedy
    - open_layouts_sticky_noisy
    - random_motion_obstacles
    - bottlenecks
    - forced_handoff
    - full_partner_pool
selection_gates:
  require_heldout_improvement: true
  require_no_known_degradation: true
  p95_inference_ms: 100

