# Option B Training Configuration: BC Warm-Start + FCP-style PPO

data_root: data
artifacts_dir: artifacts/option_b
shared_dir: artifacts/shared
reports_dir: reports

# -------- BC Warm-Start Phase (B0) --------
bc_warmstart:
  k_stack: 4
  hidden_sizes: [512, 256, 128]
  dropout: 0.1
  lr: 3.0e-4
  weight_decay: 1.0e-4
  batch_size: 512
  epochs: 60
  patience: 12
  label_smoothing: 0.02
  train_frac: 0.80
  val_frac: 0.10
  seed: 42

# -------- FCP-style PPO Phase (B1-B3) --------
ppo:
  # Hyperparameters
  gamma: 0.99
  gae_lambda: 0.95
  clip_range: 0.2
  learning_rate: 3.0e-4
  lr_warmup_steps: 1000
  entropy_coef_start: 0.05
  entropy_coef_end: 0.01
  entropy_decay_steps: 500000
  value_coef: 0.5
  max_grad_norm: 0.5
  ppo_epochs: 4
  minibatch_size: 512
  rollout_steps: 2048
  total_steps: 1000000

  # Partner pool
  partner_sampling: adaptive_cole  # uniform or adaptive_cole
  adaptive_epsilon: 0.20
  adaptive_beta: 1.0
  partner_score_update_freq: 10000
  bc_partner_temperatures: [0.75, 1.0, 1.5]
  scripted_partner_ingredients: [onion, tomato]
  scripted_partner_modes: [balanced, runner, server]
  shaped_reward_coef: 1.0
  historical_min_mean_deliveries: 1.5

  # Environment
  layout_source: all_from_data
  layout_sampling: adaptive_coverage
  layout_deficit_beta: 2.0
  layout_focus_multiplier: 3.0
  layout_focus_ids:
    - custom:custom_easy_coop:16b44f11b914
    - custom:custom_hallway:08ee62c2158f
    - custom:duelo_1v1:69b5c433e09d
    - custom:guillermo_custom_02:693051583eb0
    - custom:guillermo_custom_03:d80cc180113a
    - custom:guillermo_custom_04:d8b6465bec3a
    - custom:guillermo_custom_05:117ae8c81cdf
    - custom:salinas_custom_02:35bc9e429b00
    - named:asymmetric_advantages
    - named:counter_circuit
    - named:counter_circuit_o_1order
    - named:cramped_corridor
    - named:forced_coordination
    - named:small_corridor
  layout_preflight_timeout_s: 60
  layouts:
    - cramped_room
    - coordination_ring
    - forced_coordination
    - asymmetric_advantages
    - counter_circuit
    - simple_tomato
  agent_role_swap: true

  # Checkpointing
  checkpoint_freq_steps: 50000
  eval_checkpoint_freq_steps: 1000000
  eval_checkpoint_seeds: [101]
  eval_checkpoint_partners: [bc_clone, scripted_onion, scripted_tomato, scripted_server_tomato]
  add_historical_checkpoint_freq: 100000
  historical_checkpoint_seeds: [42, 123, 456, 789]

# -------- Export --------
export:
  output_dir: artifacts/option_b
  policy_name: option_b_fcp_ppo
  normalization_path: artifacts/shared/normalization.json
