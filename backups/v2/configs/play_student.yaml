seed: 67
mode: debug
environment:
  layout_name: cramped_room
  layout_file: null
  horizon: 250
  old_dynamics: true
policies:
  agent_0:
    type: python_class
    path: backups/v2/policies/template.py
    class_name: StudentAgent
    name: option_b_v5_agent
    config:
      mode: option_b
      model_config_path: backups/v2/weights/final_policy_config.json
      checkpoint_path: backups/v2/weights/final_policy.npz
    random_action_prob: 0
    max_action_time_ms: 100
    invalid_action: stay
    timeout_action: stay
  agent_1:
    type: builtin
    name: human_keyboard
    random_action_prob: 0
    max_action_time_ms: 100
    invalid_action: stay
    timeout_action: stay
execution:
  num_episodes: 1
  episode_seeds:
    - 67
  swap_agent_positions: false
observation:
  type: featurized
  include_agent_index: true
rendering:
  mode: window
  fps: 5
  window_caption: Overcooked-AI Play with Backup v2 Agent
  save_gif: false
  gif_path: outputs/backup_v2_student_play.gif
logging:
  output_dir: outputs/backup_v2_student_play_run
  save_step_log: true
  save_episode_summary: true
  save_trajectory_pickle: true
